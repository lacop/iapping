services:
  iapping:
    build: ..
    ports:
      - "9999:9999"
      - "9001:9001"
      - "9002:9002"
      - "9003:9003"
    command: >-
      --target-url http://demo:8000
      --jwks-address 0.0.0.0:9999
      --audience https://example.com
      --subjects 0.0.0.0:9001,user1@example.com
      --subjects 0.0.0.0:9002,user2@example.com
      --subjects 0.0.0.0:9003,user3@example.com
  demo:
    build: .
    ports:
      - "8000:8000"
    environment:
      - IAP_JWKS_URL=http://iapping:9999/jwks.json
      - IAP_JWT_AUDIENCE=https://example.com
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
