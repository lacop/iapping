name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Run cargo checks
        run: |
          cargo check
          cargo clippy -- -D warnings
          cargo fmt -- --check
          cargo publish --dry-run

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: false

      - name: Run tests
        run: |
          # Start and wait for health checks.
          docker compose -f demo/compose.yaml up --wait

          ./demo/test.sh

          docker compose -f demo/compose.yaml down

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  publish-crate:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: main
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Replace hardcoded version in Cargo.toml with the tag version.
      - name: Patch version in Cargo.toml
        run: |
          version="${GITHUB_REF#refs/tags/}"
          sed -i "s/^version = .*/version = \"$version\"/" Cargo.toml

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # We modified version in Cargo.toml, so we need to allow dirty publish.
      - run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
